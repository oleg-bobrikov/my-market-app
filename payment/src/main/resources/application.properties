spring.application.name=Payment Service

spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:h2:mem:///payment;DB_CLOSE_DELAY=-1}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME:sa}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD:}

spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.sql.init.mode=always

logging.level.ru.yandex.practicum=DEBUG
app.cookie.max-age=7d
